spring.application.name=poczta-backend
server.port=8081

# Oracle Database
spring.datasource.url=jdbc:oracle:thin:@localhost:1522/XEPDB1
spring.datasource.username=springuser
spring.datasource.password=spring
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=pingwin
spring.rabbitmq.password=pingwin123

# Mail (Maildev for local development)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
app.mail.from=noreply@pingwinpost.pl
app.mail.enabled=true

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# Frontend URL for OAuth2 redirect
app.frontend.url=${FRONTEND_URL:http://localhost:4173}

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.success-url=${app.frontend.url}/client/shipments/{paymentId}/stripe-success
stripe.cancel-url=${app.frontend.url}/client/shipments/{paymentId}?payment=cancelled
